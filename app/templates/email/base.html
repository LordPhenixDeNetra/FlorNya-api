<!DOCTYPE html>
<html lang="{{ language | default('fr') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fdf6f9; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 40px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #e91e8c, #c2185b); padding: 32px 40px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .header p { color: rgba(255,255,255,0.85); margin: 6px 0 0; font-size: 14px; }
    .body { padding: 36px 40px; color: #2d2d2d; line-height: 1.6; }
    .body h2 { font-size: 18px; margin-top: 0; color: #1a1a1a; }
    .btn { display: inline-block; margin: 24px 0; padding: 14px 32px; background: #e91e8c; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 15px; }
    .footer { padding: 20px 40px; background: #fdf6f9; text-align: center; font-size: 12px; color: #999; border-top: 1px solid #f0e6ec; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌸 FlorNya</h1>
      <p>Fleuris à chaque étape.</p>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      © 2026 FlorNya · <a href="{{ frontend_url }}" style="color:#e91e8c">flornya.app</a>
      <br>Cet email a été envoyé automatiquement, merci de ne pas y répondre.
    </div>
  </div>
</body>
</html>
