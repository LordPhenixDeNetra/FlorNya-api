<!DOCTYPE html>
<html lang="{{ language | default('fr') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <title>{% block title %}FlorNya{% endblock %}</title>
  <style type="text/css">
    {% autoescape false %}{% include "base.css" %}{% endautoescape %}
  </style>
</head>
<body style="margin:0; padding:0; background-color:#faf5f8;">

  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="outer-bg"
         style="background-color:#faf5f8;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <!-- ── Card ────────────────────────────────────────────────── -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" class="email-card"
               style="max-width:600px; width:100%; background-color:#ffffff; border-radius:16px; overflow:hidden;
                      box-shadow:0 2px 20px rgba(233,30,140,0.07);">

          <!-- Accent bar -->
          <tr>
            <td style="height:4px; background-color:#e91e8c; font-size:0; line-height:0;">&nbsp;</td>
          </tr>

          <!-- Header -->
          <tr>
            <td class="header-td" align="center"
                style="background-color:#ffffff; padding:38px 48px 28px;">
              <span style="font-size:30px; line-height:1; display:block; margin-bottom:10px;">🌸</span>
              <span class="logo-name"
                    style="font-size:22px; font-weight:700; color:#1a1a2e; letter-spacing:-0.3px; display:block;">
                Flor<span style="color:#e91e8c;">Nya</span>
              </span>
              <span style="font-size:11px; color:#a09098; letter-spacing:1px;
                           text-transform:uppercase; margin-top:5px; display:block;">
                Fleuris à chaque étape
              </span>
            </td>
          </tr>

          <!-- Header / body separator -->
          <tr>
            <td>
              <div class="inner-div divider-inner"
                   style="height:1px; background-color:#f0e6ec; margin:0 48px; font-size:0;">&nbsp;</div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td class="body-td"
                style="padding:40px 48px; font-size:15px; line-height:1.7;
                       color:#1a1a2e; font-family:Arial,Helvetica,sans-serif; background-color:#ffffff;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="footer-td" align="center"
                style="background-color:#faf5f8; padding:22px 48px;
                       border-top:1px solid #f0e6ec; font-family:Arial,Helvetica,sans-serif;">
              <p style="margin:0 0 4px; font-size:11px; color:#a09098;">
                © 2026 FlorNya &nbsp;·&nbsp;
                <a href="{{ frontend_url }}" style="color:#e91e8c; text-decoration:none;">flornya.app</a>
              </p>
              <p style="margin:0; font-size:10px; color:#c0aab6;">
                Cet email a été envoyé automatiquement, merci de ne pas y répondre.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
